<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Jendela Otomatis</title>
</head>
<body>

    <button onclick="eksekusi()">Mulai Buka Web</button>

    <script>
        function eksekusi() {
            // Web pertama: gtw
            window.open("https://www.bbb.com", "_blank");

            // Web kedua: Wikipedia (setelah delay 2 detik)
            setTimeout(function() {
                window.open("https://www.wikipedia.org", "_blank");
            }, 2000);
        }
    </script>

</body>
</html>
